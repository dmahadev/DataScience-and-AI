# IMPORTANT: This file is a template. Replace placeholder values with real
# secrets before applying to a cluster, or manage secrets with a solution such
# as AWS Secrets Manager, HashiCorp Vault, or Sealed Secrets.
#
# Apply with:
#   kubectl apply -f k8s/secret.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: documagic-secrets
  namespace: documagic
  labels:
    app.kubernetes.io/name: documagic
    app.kubernetes.io/part-of: documagic-data-pipeline
type: Opaque
stringData:
  # AWS credentials (prefer IAM Roles for Service Accounts in EKS)
  AWS_ACCESS_KEY_ID: "<REPLACE_ME>"
  AWS_SECRET_ACCESS_KEY: "<REPLACE_ME>"

  # API authentication key
  DOCUMAGIC_API_KEY: "<REPLACE_ME>"

  # Step Functions ARN
  STEP_FUNCTION_ARN: "<REPLACE_ME>"
