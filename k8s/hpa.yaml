# Horizontal Pod Autoscaler for the API deployment
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: documagic-api-hpa
  namespace: documagic
  labels:
    app.kubernetes.io/name: documagic-api
    app.kubernetes.io/part-of: documagic-data-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: documagic-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# Horizontal Pod Autoscaler for the Agents deployment
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: documagic-agents-hpa
  namespace: documagic
  labels:
    app.kubernetes.io/name: documagic-agents
    app.kubernetes.io/part-of: documagic-data-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: documagic-agents
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
