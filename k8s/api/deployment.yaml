apiVersion: apps/v1
kind: Deployment
metadata:
  name: documagic-api
  namespace: documagic
  labels:
    app.kubernetes.io/name: documagic-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: documagic-data-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: documagic-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: documagic-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: documagic-data-pipeline
    spec:
      serviceAccountName: documagic-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: api
          image: documagic/api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: documagic-config
            - secretRef:
                name: documagic-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: documagic-api-sa
  namespace: documagic
  labels:
    app.kubernetes.io/name: documagic-api
    app.kubernetes.io/part-of: documagic-data-pipeline
  annotations:
    # AWS IAM Role for Service Accounts (IRSA) – replace <ACCOUNT_ID> with your
    # 12-digit AWS account ID before applying this manifest to the cluster.
    eks.amazonaws.com/role-arn: "arn:aws:iam::<ACCOUNT_ID>:role/documagic-api-role"
