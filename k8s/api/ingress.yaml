apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: documagic-api
  namespace: documagic
  labels:
    app.kubernetes.io/name: documagic-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: documagic-data-pipeline
  annotations:
    # AWS ALB Ingress Controller annotations
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}, {"HTTP": 80}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: "/health"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "10"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
spec:
  rules:
    - host: api.documagic.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: documagic-api
                port:
                  name: http
  tls:
    - hosts:
        - api.documagic.example.com
      secretName: documagic-api-tls
