apiVersion: v1
kind: Service
metadata:
  name: documagic-agents
  namespace: documagic
  labels:
    app.kubernetes.io/name: documagic-agents
    app.kubernetes.io/component: agents
    app.kubernetes.io/part-of: documagic-data-pipeline
spec:
  # Headless service – agents are not externally reachable; the API calls them in-process
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: documagic-agents
  ports:
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
