apiVersion: apps/v1
kind: Deployment
metadata:
  name: documagic-agents
  namespace: documagic
  labels:
    app.kubernetes.io/name: documagic-agents
    app.kubernetes.io/component: agents
    app.kubernetes.io/part-of: documagic-data-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: documagic-agents
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: documagic-agents
        app.kubernetes.io/component: agents
        app.kubernetes.io/part-of: documagic-data-pipeline
    spec:
      serviceAccountName: documagic-agents-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: agents
          image: documagic/api:latest
          imagePullPolicy: Always
          # Run only the standalone agent worker (no HTTP server)
          command:
            - "python"
            - "-m"
            - "src.agents.worker"
          envFrom:
            - configMapRef:
                name: documagic-config
            - secretRef:
                name: documagic-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: documagic-agents-sa
  namespace: documagic
  labels:
    app.kubernetes.io/name: documagic-agents
    app.kubernetes.io/part-of: documagic-data-pipeline
  annotations:
    # AWS IAM Role for Service Accounts (IRSA) – replace <ACCOUNT_ID> with your
    # 12-digit AWS account ID before applying this manifest to the cluster.
    eks.amazonaws.com/role-arn: "arn:aws:iam::<ACCOUNT_ID>:role/documagic-agents-role"
