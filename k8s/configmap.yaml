apiVersion: v1
kind: ConfigMap
metadata:
  name: documagic-config
  namespace: documagic
  labels:
    app.kubernetes.io/name: documagic
    app.kubernetes.io/part-of: documagic-data-pipeline
data:
  # Application
  APP_NAME: "DocuMagic Data Processing API"
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  DEBUG: "false"

  # Server
  HOST: "0.0.0.0"
  PORT: "8000"
  WORKERS: "2"

  # AWS
  AWS_REGION: "us-west-2"

  # S3
  S3_BUCKET_NAME: "DocuMagic-bucket"
  S3_RAW_PREFIX: "raw/"
  S3_PROCESSED_PREFIX: "processed/"

  # DynamoDB
  DYNAMODB_TABLE_NAME: "DocuMagic-table"

  # Bedrock
  BEDROCK_MODEL_ID: "anthropic.claude-3-sonnet-20240229-v1:0"
  BEDROCK_MAX_TOKENS: "4096"

  # Pipeline
  PIPELINE_MAX_WORKERS: "4"
  PIPELINE_BATCH_SIZE: "100"
  PIPELINE_TIMEOUT_SECONDS: "300"

  # Logging
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
